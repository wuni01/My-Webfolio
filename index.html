<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kim Chaewoon Portfolio</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="min-h-screen bg-[#f5f5f5] text-[#1a1a1a] font-sans selection:bg-emerald-100 selection:text-emerald-900">
    <div id="app">
      <!-- Header Section -->
      <header class="pt-24 pb-16 px-6 text-center fade-in">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-4">
          Kim Chaewoon
        </h1>
        <p class="text-lg md:text-xl text-gray-500 font-medium">
          Android Developer
        </p>
      </header>

      <!-- Main Content -->
      <main class="max-w-4xl mx-auto px-6 pb-24">
        <div class="grid md:grid-cols-2 gap-8">
          <!-- Programming Skills Box -->
          <section class="bg-white rounded-2xl p-8 shadow-sm border border-black/5 hover:shadow-md transition-all slide-up" style="animation-delay: 0.2s">
            <div class="flex items-center gap-3 mb-6">
              <div class="p-2 bg-emerald-50 rounded-lg text-emerald-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-code-2"><path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/></svg>
              </div>
              <h2 class="text-xl font-semibold">Programming Skills</h2>
            </div>
            <div class="flex flex-wrap gap-2" id="programming-skills">
              <!-- Skills will be injected here -->
            </div>
          </section>

          <!-- Development Tools Box -->
          <section class="bg-white rounded-2xl p-8 shadow-sm border border-black/5 hover:shadow-md transition-all slide-up" style="animation-delay: 0.3s">
            <div class="flex items-center gap-3 mb-6">
              <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-wrench"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
              </div>
              <h2 class="text-xl font-semibold">DevTools</h2>
            </div>
            <div class="flex flex-wrap gap-2" id="development-tools">
              <!-- Tools will be injected here -->
            </div>
          </section>
        </div>

        <!-- Projects Section -->
        <section class="mt-24 slide-up" style="animation-delay: 0.4s">
          <h2 class="text-2xl font-bold mb-8 text-center">My Projects</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-8" id="projects-container">
            <!-- Projects will be injected here -->
          </div>
        </section>

        <!-- Footer -->
        <footer class="mt-24 pt-12 border-t border-gray-200 text-center text-gray-400 text-sm fade-in" style="animation-delay: 0.5s">
          <div class="flex justify-center gap-6 mb-4">
            <a href="#" class="hover:text-emerald-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>
            </a>
            <a href="#" class="hover:text-emerald-600 transition-colors">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            </a>
          </div>
          <p>© <span id="year"></span> Kim Chaewoon. All rights reserved.</p>
        </footer>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
