name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"] # main 브랜치에 코드가 올라올 때마다 실행

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 사용 중인 Node.js 버전
          
      - name: Install dependencies
        run: npm install # 필요한 패키지 설치
        
      - name: Build
        run: npm run build # Vite 빌드 실행 (dist 폴더 생성)
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 빌드 결과물이 저장되는 폴더
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
